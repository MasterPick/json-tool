name: Build Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: "json-tool"
            ext: ""
            path_suffix: "linux"
            release: true
          - os: windows-latest
            artifact_name: "json-tool.exe"
            ext: ".exe"
            path_suffix: "win"
            release: false
          - os: macos-latest
            artifact_name: "json-tool"
            ext: ""
            path_suffix: "macos"
            release: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Build binary
        run: |
          pkg server.js --targets node18-${{ matrix.path_suffix }} --output dist/${{ matrix.artifact_name }}
        env:
          PKG_EXECPATH: ${{ github.workspace }}/node_modules/.bin/pkg

      - name: Make executable (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: chmod +x dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ matrix.os }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 5

      - name: Create Draft Release
        if: matrix.release == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.0.0 --repo MasterPick/json-tool --title "Build v1.0.0 - Cross-Platform Binaries" --draft --notes "Cross-platform binaries for json-tool v1.0.0"
          
      - name: Upload to Release
        if: matrix.release == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.0 dist/${{ matrix.artifact_name }} --repo MasterPick/json-tool --clobber